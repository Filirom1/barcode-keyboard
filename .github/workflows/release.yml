name: Build & Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── WASM (web frontend) ──────────────────────────────────────────────────────
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install LLVM tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang llvm lld binaryen

      - name: Install wasm-bindgen-cli (pinned)
        run: cargo install wasm-bindgen-cli --version 0.2.114 --locked

      - name: Build WASM
        env:
          CC_wasm32_unknown_unknown: clang
          AR_wasm32_unknown_unknown: llvm-ar
        run: |
          cargo build --target wasm32-unknown-unknown --release
          wasm-bindgen \
            ./target/wasm32-unknown-unknown/release/barcode_keyboard.wasm \
            --out-dir=public/wasm --weak-refs --target=web
          wasm-opt \
            --enable-nontrapping-float-to-int --enable-bulk-memory --enable-sign-ext \
            -Os \
            -o public/wasm/barcode_keyboard_bg.wasm \
            public/wasm/barcode_keyboard_bg.wasm

      - name: Sanity check (no "env" imports)
        run: |
          count=$(grep -c 'from "env"' public/wasm/barcode_keyboard.js || true)
          echo "env imports: $count"
          [ "$count" -eq 0 ]

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: public/

  # ── Linux binary ─────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libxinerama-dev libgl1-mesa-dev xdotool libxdo-dev

      - name: Build keyboard binary
        run: cargo build --features keyboard --bin keyboard --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keyboard-linux-x86_64
          path: target/release/keyboard

  # ── Windows binary ───────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build keyboard binary
        run: cargo build --features keyboard --bin keyboard --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keyboard-windows-x86_64
          path: target/release/keyboard.exe

  # ── GitHub Release (on tag) ──────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build-wasm, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Rename binaries with platform suffix
        run: |
          mv keyboard-linux-x86_64/keyboard  keyboard-linux-x86_64/keyboard-linux-x86_64
          mv keyboard-windows-x86_64/keyboard.exe  keyboard-windows-x86_64/keyboard-windows-x86_64.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            keyboard-linux-x86_64/keyboard-linux-x86_64
            keyboard-windows-x86_64/keyboard-windows-x86_64.exe
